services:
  # Backend API
  - type: web
    name: saasai-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false

  # Frontend
  - type: web
    name: saasai-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SHORT_BASE_URL
        value: https://linkbotai.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
